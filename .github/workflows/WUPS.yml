name: Wii U Plugin CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget xz-utils git ca-certificates

      - name: Setup devkitPro
        run: |
          wget https://github.com/devkitPro/pacman/releases/download/v6.0.2/bootstrap-linux-x86_64.tar.xz
          tar -xf bootstrap-linux-x86_64.tar.xz
          sudo ./bootstrap-linux-x86_64/install-devkitpro-pacman

      - name: Install Wii U devkit
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm wiiu-dev

      - name: Build
        run: make